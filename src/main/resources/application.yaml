spring:
  application:
    name: travel-planner-agent
  config:
    import: optional:file:.env[.properties]

embabel:
  models:
    default-llm: gpt-4.1-nano   # Modelo más económico de OpenAI
  agent:
    platform:
      llm-operations:
        data-binding:
          max-attempts: 5
        prompts:
          generate-examples-by-default: false
      models:
        openai:
          max-attempts: 3
          backoff-millis: 2000
        anthropic:
          max-attempts: 3
          backoff-millis: 2000
    logging:
      personality: default
      verbosity: info

# API keys are loaded from .env file (see .env.example).
# Each LLM starter only activates when its key is present.
