spring:
  application:
    name: travel-planner-agent
  config:
    import: optional:file:.env[.properties]
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false

embabel:
  models:
    default-llm: gpt-4.1-nano   # Modelo más económico de OpenAI
  agent:
    platform:
      llm-operations:
        data-binding:
          max-attempts: 5
        prompts:
          generate-examples-by-default: false
      models:
        openai:
          max-attempts: 3
          backoff-millis: 2000
        anthropic:
          max-attempts: 3
          backoff-millis: 2000
    logging:
      personality: starwars
      verbosity: info

travel-planner:
  memory:
    enabled: true
    user-id: default
    storage-path: ./data
    max-trip-history: 20
    preference-window-size: 3

# API keys are loaded from .env file (see .env.example).
# Each LLM starter only activates when its key is present.
